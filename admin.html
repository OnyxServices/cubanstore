<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Admin - Gestión Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Estilos generales (Mantenidos y mejorados) */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    body {
      background-color: #0F172B;
      color: #e2e8f0;
      line-height: 1.6;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
      min-height: 100vh;
    }
    
    h1 {
      color: #60a5fa;
      text-align: center;
      margin-bottom: 10px;
      font-size: 2.2rem;
    }
    
    h2 {
      color: #93c5fd;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid #334155;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-section {
      background-color: #1e293b;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.3);
      padding: 25px;
      margin-bottom: 30px;
      border: 1px solid #334155;
    }

    /* Ocultar secciones dinámicamente */
    .hidden { display: none; }
    
    /* Inputs y Form de edición rápida */
    .edit-input {
      background-color: #0F172B;
      color: #fff;
      border: 1px solid #60a5fa;
      padding: 5px;
      border-radius: 4px;
      margin-bottom: 5px;
      width: 100%;
    }

    /* Botones */
    .btn-back {
      background-color: #475569;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 20px;
    }

    .btn-edit { background-color: #f59e0b; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
    .btn-save { background-color: #10b981; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
    .btn-cancel { background-color: #64748b; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
    .btn-view { background-color: #3b82f6; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }

    /* Los demás estilos se heredan del original... */
    .form-row { display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; margin-bottom: 15px;}
    .form-field { flex: 1; min-width: 200px; }
    label { display: block; margin-bottom: 8px; font-size: 14px; color: #cbd5e1; }
    input, select { width: 100%; padding: 12px; background-color: #0F172B; color: #e2e8f0; border: 1px solid #475569; border-radius: 8px; }
    
    .create-button { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 500; }
    
    li { background-color: #0F172B; border: 1px solid #334155; border-radius: 8px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    .list-actions { display: flex; gap: 8px; }
    .status-badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; }
    .status-active { background: #064e3b; color: #10b981; }
    .alert { padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    .alert-success { background: rgba(16, 185, 129, 0.1); color: #10b981; border-left: 4px solid #10b981; }
    .alert-error { background: rgba(239, 68, 68, 0.1); color: #ef4444; border-left: 4px solid #ef4444; }
  </style>
</head>
<body>

  <div class="admin-header">
    <div class="logo">
      <div class="logo-icon"></div>
      <div class="logo-text">Panel de Administración</div>
    </div>
  </div>

  <!-- SECCIÓN DE CATEGORÍAS -->
  <div id="section-categories" class="panel-section">
    <h2>📁 Categorías del Menú</h2>
    
    <div class="form-row">
      <div class="form-field">
        <label>Nombre:</label>
        <input id="cat-name" placeholder="Ej: Hamburguesas">
      </div>
      <div class="form-field">
        <label>Imagen:</label>
        <input type="file" id="cat-img" accept="image/*">
      </div>
      <button class="create-button" onclick="addCategory()">➕ Crear</button>
    </div>
    
    <ul id="categories-list"></ul>
  </div>

  <!-- SECCIÓN DE PRODUCTOS (Se activa al entrar en una categoría) -->
  <div id="section-products" class="panel-section hidden">
    <button class="btn-back" onclick="showCategories()">⬅ Volver a Categorías</button>
    <h2 id="current-cat-title">🛍️ Productos</h2>
    
    <div class="form-row">
      <div class="form-field">
        <label>Producto:</label>
        <input id="prod-name" placeholder="Nombre del producto">
      </div>
      <div class="form-field">
        <label>Precio ($):</label>
        <input id="prod-price" type="number" step="0.01">
      </div>
      <div class="form-field">
        <label>Imagen:</label>
        <input type="file" id="prod-img" accept="image/*">
      </div>
      <button class="create-button" onclick="addProduct()">➕ Agregar</button>
    </div>
    
    <ul id="products-list"></ul>
  </div>

  <!-- ... (Mantén tu CSS igual) ... -->

<script type="module">
    import { getCategories, getAllProducts } from './api.js';

    // Variables de estado
    let allProducts = [];
    let allCategories = [];
    let currentCategoryId = null;

    async function refreshData() {
      try {
        console.log("Cargando datos de Supabase...");
        const [categories, products] = await Promise.all([getCategories(), getAllProducts()]);
        
        allCategories = categories;
        allProducts = products;

        renderCategories();
        
        if (currentCategoryId) {
            renderProducts();
        }
      } catch (error) {
        console.error("Error al obtener datos:", error);
      }
    }

    // Corregido: Coincide con id="categories-list"
    function renderCategories() {
      const list = document.getElementById('categories-list');
      if (!list) return;

      list.innerHTML = allCategories.map(cat => `
        <li>
          <div style="display:flex; align-items:center; gap:10px">
            <img src="${cat.image_url || ''}" width="40" height="40" style="border-radius:5px; object-fit:cover">
            <span>${cat.name}</span>
          </div>
          <div class="list-actions">
            <button class="btn-view" onclick="showCategoryProducts('${cat.id}', '${cat.name}')">Ver Productos</button>
            <button class="btn-edit">✏️</button>
          </div>
        </li>
      `).join('');
    }

    // Corregido: Coincide con id="products-list"
    function renderProducts() {
      const list = document.getElementById('products-list');
      const filtered = allProducts.filter(p => String(p.category_id) === String(currentCategoryId));

      list.innerHTML = filtered.map(p => `
        <li>
          <div>
            <div style="font-weight:bold">${p.name}</div>
            <div style="color:#10b981">$${p.price}</div>
          </div>
          <div class="list-actions">
            <button class="btn-edit">Editar</button>
            <button style="background:#ef4444; color:white; border:none; padding:5px; border-radius:4px;">Eliminar</button>
          </div>
        </li>
      `).join('');
    }

    // Funciones de navegación (Expuestas a window para que funcionen los onclick del HTML)
    window.showCategoryProducts = function(id, name) {
      currentCategoryId = id;
      document.getElementById('section-categories').classList.add('hidden');
      document.getElementById('section-products').classList.remove('hidden');
      document.getElementById('current-cat-title').innerText = `Productos en: ${name}`;
      renderProducts();
    }

    window.showCategories = function() {
      currentCategoryId = null;
      document.getElementById('section-products').classList.add('hidden');
      document.getElementById('section-categories').classList.remove('hidden');
    }

    // Faltan las lógicas de ADD que tienes en los botones
    window.addCategory = async function() {
        const name = document.getElementById('cat-name').value;
        console.log("Aquí deberías llamar a una función insertCategory(name) en api.js");
        // Implementar lógica de guardado...
    }

    window.addProduct = async function() {
        // Implementar lógica de guardado...
    }

    // Inicialización
    refreshData();
    
    // Intervalo de seguridad (ajustado a 30 segundos, 1 segundo es demasiado)
    setInterval(refreshData, 30000);
</script>
</body>
</html>
