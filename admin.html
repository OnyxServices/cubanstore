<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Admin - Gestión Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Estilos generales (Mantenidos y mejorados) */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    body {
      background-color: #0F172B;
      color: #e2e8f0;
      line-height: 1.6;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
      min-height: 100vh;
    }
    
    h1 {
      color: #60a5fa;
      text-align: center;
      margin-bottom: 10px;
      font-size: 2.2rem;
    }
    
    h2 {
      color: #93c5fd;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid #334155;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-section {
      background-color: #1e293b;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.3);
      padding: 25px;
      margin-bottom: 30px;
      border: 1px solid #334155;
    }

    /* Ocultar secciones dinámicamente */
    .hidden { display: none; }
    
    /* Inputs y Form de edición rápida */
    .edit-input {
      background-color: #0F172B;
      color: #fff;
      border: 1px solid #60a5fa;
      padding: 5px;
      border-radius: 4px;
      margin-bottom: 5px;
      width: 100%;
    }

    /* Botones */
    .btn-back {
      background-color: #475569;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 20px;
    }

    .btn-edit { background-color: #f59e0b; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
    .btn-save { background-color: #10b981; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
    .btn-cancel { background-color: #64748b; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
    .btn-view { background-color: #3b82f6; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }

    /* Los demás estilos se heredan del original... */
    .form-row { display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; margin-bottom: 15px;}
    .form-field { flex: 1; min-width: 200px; }
    label { display: block; margin-bottom: 8px; font-size: 14px; color: #cbd5e1; }
    input, select { width: 100%; padding: 12px; background-color: #0F172B; color: #e2e8f0; border: 1px solid #475569; border-radius: 8px; }
    
    .create-button { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 500; }
    
    li { background-color: #0F172B; border: 1px solid #334155; border-radius: 8px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    .list-actions { display: flex; gap: 8px; }
    .status-badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; }
    .status-active { background: #064e3b; color: #10b981; }
    .alert { padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    .alert-success { background: rgba(16, 185, 129, 0.1); color: #10b981; border-left: 4px solid #10b981; }
    .alert-error { background: rgba(239, 68, 68, 0.1); color: #ef4444; border-left: 4px solid #ef4444; }
  </style>
</head>
<body>

  <div class="admin-header">
    <div class="logo">
      <div class="logo-icon"></div>
      <div class="logo-text">Panel de Administración</div>
    </div>
  </div>

  <!-- SECCIÓN DE CATEGORÍAS -->
  <div id="section-categories" class="panel-section">
    <h2>📁 Categorías del Menú</h2>
    
    <div class="form-row">
      <div class="form-field">
        <label>Nombre:</label>
        <input id="cat-name" placeholder="Ej: Hamburguesas">
      </div>
      <div class="form-field">
        <label>Imagen:</label>
        <input type="file" id="cat-img" accept="image/*">
      </div>
      <button class="create-button" onclick="addCategory()">➕ Crear</button>
    </div>
    
    <ul id="categories-list"></ul>
  </div>

  <!-- SECCIÓN DE PRODUCTOS (Se activa al entrar en una categoría) -->
  <div id="section-products" class="panel-section hidden">
    <button class="btn-back" onclick="showCategories()">⬅ Volver a Categorías</button>
    <h2 id="current-cat-title">🛍️ Productos</h2>
    
    <div class="form-row">
      <div class="form-field">
        <label>Producto:</label>
        <input id="prod-name" placeholder="Nombre del producto">
      </div>
      <div class="form-field">
        <label>Precio ($):</label>
        <input id="prod-price" type="number" step="0.01">
      </div>
      <div class="form-field">
        <label>Imagen:</label>
        <input type="file" id="prod-img" accept="image/*">
      </div>
      <button class="create-button" onclick="addProduct()">➕ Agregar</button>
    </div>
    
    <ul id="products-list"></ul>
  </div>

  <script type="module">
    import { getCategories, getAllProducts } from './api.js';

    let allProducts = [];
    let allCategories = [];
    let cart = [];
    let currentCategoryId = null; // Rastrea qué categoría está viendo el usuario
    let currentCategoryName = "";

    // Función principal para cargar y recargar datos
    async function updateData(isInitial = false) {
      try {
        const [categories, products] = await Promise.all([getCategories(), getAllProducts()]);
        
        allProducts = products;
        allCategories = categories;

        // 1. Actualizar visualmente las categorías
        renderCategories(allCategories);

        // 2. Si el usuario está dentro de una categoría, actualizar los productos en tiempo real
        if (currentCategoryId) {
          refreshProductGrid();
        }

        // 3. Manejo de pantalla de carga (solo la primera vez)
        if (isInitial) {
          lucide.createIcons();
          setTimeout(() => {
            const splash = document.getElementById('splash-screen');
            if(splash) {
                splash.style.opacity = '0';
                splash.style.visibility = 'hidden';
            }
          }, 3000);
        } else {
          // Re-inicializar iconos de lucide para nuevos elementos cargados
          lucide.createIcons();
        }

      } catch (e) {
        console.error("Error cargando datos:", e);
        if (isInitial) {
          document.getElementById('categories').innerHTML = "<p>Error de conexión.</p>";
        }
      }
    }

    function renderCategories(categories) {
      const container = document.getElementById('categories');
      container.innerHTML = categories.map(cat => `
        <div class="category-card" onclick="showCategory('${cat.id}', '${cat.name}')">
          <img src="${cat.image_url || 'https://via.placeholder.com/60'}" alt="${cat.name}">
          <div style="font-size: 0.9rem; font-weight: 600;">${cat.name}</div>
        </div>
      `).join('');
    }

    // Nueva función para refrescar la rejilla de productos sin cambiar de vista
    function refreshProductGrid() {
      const grid = document.getElementById('products');
      const filtered = allProducts.filter(p => String(p.category_id) === String(currentCategoryId) && p.active !== false);

      if (filtered.length === 0) {
        grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; padding: 40px; color: #64748b;">No hay productos disponibles.</p>`;
      } else {
        grid.innerHTML = filtered.map(p => `
          <div class="product-card">
            <img src="${p.image_url || 'https://via.placeholder.com/240'}" alt="${p.name}">
            <div class="product-info">
              <div class="product-name">${p.name}</div>
              <div class="product-price">CUP ${Number(p.price).toFixed(2)}</div>
              <button class="btn-add" onclick="addToCart('${p.id}')">
                <i data-lucide="plus-circle" style="width:16px"></i> Agregar
              </button>
            </div>
          </div>
        `).join('');
      }
      lucide.createIcons();
    }

    window.showCategory = function(id, name) {
      currentCategoryId = id; // Guardamos el ID actual
      currentCategoryName = name;
      
      document.getElementById('categories-section').style.display = 'none';
      const section = document.getElementById('products-section');
      const title = document.getElementById('selected-category-name');
      
      section.style.display = 'block';
      title.innerHTML = `<i data-lucide="layers"></i> ${name}`;
      
      refreshProductGrid();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.hideProducts = function() {
      currentCategoryId = null; // Limpiamos el rastro de la categoría
      document.getElementById('products-section').style.display = 'none';
      document.getElementById('categories-section').style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // --- El resto de tus funciones se mantienen igual ---

    window.showToast = function(text) {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `<i data-lucide="check-circle" style="color:var(--accent)"></i> ${text}`;
      container.appendChild(toast);
      lucide.createIcons();
      setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 300);
      }, 2500);
    }

    window.addToCart = function(id) {
      const prod = allProducts.find(p => String(p.id) === String(id));
      if(prod) {
        cart.push({...prod});
        updateCartUI();
        showToast(`${prod.name} añadido`);
        const cartBtn = document.querySelector('.cart-btn');
        cartBtn.style.transform = 'scale(1.2)';
        setTimeout(() => cartBtn.style.transform = 'scale(1)', 200);
      }
    }

    window.removeItem = function(index) {
      cart.splice(index, 1);
      updateCartUI();
    }

    window.toggleCart = function(show) {
      document.getElementById('cart-overlay').classList.toggle('open', show);
    }

    function updateCartUI() {
      const list = document.getElementById('cart-items');
      const totalEl = document.getElementById('cart-total');
      const countEl = document.getElementById('cart-count');
      countEl.textContent = cart.length;

      if (cart.length === 0) {
        list.innerHTML = `<p style="text-align:center; color: #64748b; margin-top: 40px;">El carrito está vacío</p>`;
        totalEl.textContent = "CUP 0.00";
      } else {
        let total = 0;
        list.innerHTML = cart.map((item, index) => {
          total += Number(item.price);
          return `
            <div class="cart-item">
              <div>
                <div style="font-weight:600">${item.name}</div>
                <div style="font-size:0.85rem; color:var(--primary)">CUP ${Number(item.price).toFixed(2)}</div>
              </div>
              <button onclick="removeItem(${index})" style="background:none; border:none; color:#ef4444; cursor:pointer">
                <i data-lucide="trash-2" style="width:18px"></i>
              </button>
            </div>
          `;
        }).join('');
        totalEl.textContent = `CUP ${total.toFixed(2)}`;
      }
      lucide.createIcons();
      checkForm();
    }

    function checkForm() {
      const name = document.getElementById('cust-name').value.trim();
      const addr = document.getElementById('cust-address').value.trim();
      const phon = document.getElementById('cust-phone').value.trim();
      const btn = document.getElementById('btn-whatsapp');
      const isReady = name.length > 2 && addr.length > 5 && phon.length > 6 && cart.length > 0;
      btn.disabled = !isReady;
      btn.style.opacity = isReady ? "1" : "0.5";
    }

    ['cust-name', 'cust-address', 'cust-phone'].forEach(id => {
      document.getElementById(id).addEventListener('input', checkForm);
    });

    document.getElementById('btn-whatsapp').onclick = function() {
      const name = document.getElementById('cust-name').value;
      const addr = document.getElementById('cust-address').value;
      const phon = document.getElementById('cust-phone').value;
      let msg = `*NUEVO PEDIDO - CUBAN-STORE* 🛒\n\n`;
      cart.forEach(i => msg += `• ${i.name} - CUP ${Number(i.price).toFixed(2)}\n`);
      const total = cart.reduce((a, b) => a + Number(b.price), 0);
      msg += `\n*Total: CUP ${total.toFixed(2)}*`;
      msg += `\n\n*Cliente:* ${name}\n*Dirección:* ${addr}\n*Teléfono:* ${phon}`;
      window.open(`https://wa.me/53910527?text=${encodeURIComponent(msg)}`, '_blank');
    };

    // Carga inicial
    updateData(true);

    // RECARGA EN SEGUNDO PLANO: cada 30 segundos (30000 ms)
    setInterval(() => {
      updateData(false);
    }, 30000);

</script>
</body>
</html>
