<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cuban-Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-N4MDCLCP85"></script>

  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-N4MDCLCP85');

  <!-- Reemplaza todo el contenido del estilo actual con este código: -->
<style>
  /* =========================================
     VARIABLES MODERNAS - DARK PREMIUM PRO
     ========================================= */
  :root {
    --primary: #0A0A0A;          /* Negro puro para fondo */
    --secondary: #161616;        /* Gris muy oscuro para tarjetas */
    --tertiary: #1F1F1F;         /* Para elementos secundarios */
    --accent: #FFD700;           /* Dorado brillante premium */
    --accent-secondary: #C5A028; /* Dorado más suave para hover */
    --accent-glow: rgba(255, 215, 0, 0.15); /* Efecto glow dorado */
    --bg-gradient: linear-gradient(135deg, #0A0A0A 0%, #1A1A1A 100%);
    --text-main: #F5F5F5;
    --text-muted: #AAAAAA;
    --text-light: #D4D4D4;
    --border: #2A2A2A;
    --border-light: #3A3A3A;
    --radius-lg: 20px;
    --radius-md: 14px;
    --radius-sm: 10px;
    --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.6);
    --shadow-md: 0 10px 20px rgba(0, 0, 0, 0.4);
    --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.25);
    --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    --transition-fast: all 0.15s ease;
    --error: #FF5252;
    --success: #4CAF50;
  }

  /* =========================================
     RESET Y TIPOGRAFÍA
     ========================================= */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700&display=swap');

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-gradient);
    color: var(--text-main);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
    min-height: 100vh;
  }

  h1, h2, h3, h4, h5, h6 {
    font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  /* =========================================
     PANTALLA DE CARGA PREMIUM
     ========================================= */
  #splash-screen {
    position: fixed;
    inset: 0;
    background: var(--primary);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.8s ease, visibility 0.8s ease;
  }

  .logo-premium {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 4rem;
    font-weight: 800;
    background: linear-gradient(135deg, #FFD700 0%, #FFED4E 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 0.5rem;
    position: relative;
    animation: pulse 2s infinite alternate;
  }

  .logo-premium::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 100px;
    height: 3px;
    background: linear-gradient(90deg, transparent, #FFD700, transparent);
  }

  .splash-subtitle {
    color: var(--text-muted);
    font-size: 1rem;
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 3rem;
    font-weight: 300;
  }

  .loader-container {
    width: 220px;
    height: 3px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 10px;
    overflow: hidden;
    position: relative;
  }

  .loader-bar {
    width: 40%;
    height: 100%;
    background: linear-gradient(90deg, transparent, #FFD700, transparent);
    background-size: 200% 100%;
    animation: loading 1.5s infinite ease-in-out, shimmer 2s infinite;
  }

  @keyframes pulse {
    0% { opacity: 0.9; }
    100% { opacity: 1; }
  }

  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  /* =========================================
     HEADER MODERNO Y ELEGANTE
     ========================================= */
  header {
    background: rgba(10, 10, 10, 0.92);
    padding: 1.2rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    box-shadow: var(--shadow-sm);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 1.5rem;
    font-weight: 800;
    background: linear-gradient(135deg, #FFD700 0%, #FFED4E 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1.2px;
  }

  .brand i {
    background: linear-gradient(135deg, #FFD700 0%, #FFED4E 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .cart-trigger {
    background: var(--secondary);
    color: var(--text-main);
    border: 1px solid var(--border-light);
    width: 52px;
    height: 52px;
    border-radius: var(--radius-md);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: var(--transition);
    box-shadow: var(--shadow-sm);
  }

  .cart-trigger:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--tertiary);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(255, 215, 0, 0.15);
  }

  .cart-count {
    position: absolute;
    top: -6px;
    right: -6px;
    background: var(--accent);
    color: var(--primary);
    font-size: 11px;
    font-weight: 900;
    min-width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid var(--primary);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
  }

  /* =========================================
     CONTENEDOR PRINCIPAL
     ========================================= */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  /* =========================================
     SECCIONES Y ENCABEZADOS
     ========================================= */
  .section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 2.5rem 0 1.5rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .section-header h2 {
    font-size: 1.5rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin: 0;
    background: linear-gradient(135deg, var(--text-light) 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* =========================================
     GRIDS Y TARJETAS PREMIUM
     ========================================= */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.8rem;
    margin-bottom: 3rem;
  }

  @media (max-width: 768px) {
    .grid {
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.2rem;
    }
  }

  @media (max-width: 480px) {
    .grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }
  }

  .card {
    background: var(--secondary);
    border-radius: var(--radius-lg);
    overflow: hidden;
    border: 1px solid var(--border);
    transition: var(--transition);
    position: relative;
    height: 100%;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow-md);
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    transition: var(--transition);
  }

  .card:hover {
    transform: translateY(-8px);
    border-color: var(--accent);
    box-shadow: var(--shadow-lg);
  }

  .card:hover::before {
    opacity: 1;
  }

  .card-media {
    width: 100%;
    aspect-ratio: 1/1;
    overflow: hidden;
    background: var(--tertiary);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .card-media img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
  }

  .card:hover .card-media img {
    transform: scale(1.05);
  }

  .card-body {
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    flex-grow: 1;
  }

  .card-title {
    font-weight: 600;
    font-size: 1rem;
    color: var(--text-main);
    line-height: 1.4;
    height: 2.8em;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .card-price {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--accent);
    margin-top: auto;
  }

  .btn-action {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-secondary) 100%);
    color: var(--primary);
    border: none;
    padding: 0.9rem 1.2rem;
    border-radius: var(--radius-sm);
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: var(--transition);
    font-size: 0.9rem;
    letter-spacing: 0.5px;
    margin-top: 0.5rem;
    box-shadow: 0 4px 12px rgba(255, 215, 0, 0.2);
  }

  .btn-action:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(255, 215, 0, 0.3);
  }

  /* =========================================
     BOTÓN VOLVER
     ========================================= */
  .btn-back {
    background: none;
    border: 1px solid var(--border-light);
    color: var(--accent);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 0.7rem 1.2rem;
    border-radius: var(--radius-sm);
    font-weight: 600;
    transition: var(--transition);
    margin-bottom: 1.5rem;
  }

  .btn-back:hover {
    background: rgba(255, 215, 0, 0.05);
    border-color: var(--accent);
    transform: translateX(-4px);
  }

  /* =========================================
     CARRITO (DRAWER) PREMIUM
     ========================================= */
  .drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    z-index: 2000;
    opacity: 0;
    visibility: hidden;
    transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .drawer-overlay.active {
    opacity: 1;
    visibility: visible;
  }

  .drawer {
    position: absolute;
    right: -100%;
    top: 0;
    width: 100%;
    max-width: 480px;
    height: 100%;
    background: var(--primary);
    transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    padding: 2rem;
    border-left: 1px solid var(--border);
    box-shadow: -10px 0 40px rgba(0, 0, 0, 0.5);
  }

  .drawer-overlay.active .drawer {
    right: 0;
  }

  .drawer-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .drawer-header h3 {
    margin: 0;
    letter-spacing: 1px;
    font-size: 1.5rem;
    background: linear-gradient(135deg, var(--text-light) 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .btn-close {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    width: 40px;
    height: 40px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
  }

  .btn-close:hover {
    background: rgba(255, 255, 255, 0.05);
    color: var(--text-main);
  }

  .cart-items-container {
    flex: 1;
    overflow-y: auto;
    margin-bottom: 1.5rem;
    padding-right: 0.5rem;
  }

  /* Estilo de scrollbar personalizado */
  .cart-items-container::-webkit-scrollbar {
    width: 6px;
  }

  .cart-items-container::-webkit-scrollbar-track {
    background: var(--secondary);
    border-radius: 10px;
  }

  .cart-items-container::-webkit-scrollbar-thumb {
    background: var(--accent);
    border-radius: 10px;
  }

  .cart-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1.2rem 0;
    border-bottom: 1px solid var(--border);
  }

  .cart-item:last-child {
    border-bottom: none;
  }

  .cart-item img {
    width: 60px;
    height: 60px;
    border-radius: var(--radius-sm);
    object-fit: cover;
    border: 1px solid var(--border-light);
  }

  .cart-item-info {
    flex: 1;
  }

  .cart-item-info h4 {
    margin: 0 0 0.3rem 0;
    font-size: 0.95rem;
    color: var(--text-main);
    font-weight: 600;
  }

  .cart-item-info span {
    color: var(--accent);
    font-weight: 700;
    font-size: 1.1rem;
  }

  .btn-remove {
    border: none;
    color: var(--error);
    background: none;
    cursor: pointer;
    width: 36px;
    height: 36px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
  }

  .btn-remove:hover {
    background: rgba(255, 82, 82, 0.1);
  }

  /* =========================================
     RESUMEN DEL CARRITO
     ========================================= */
  .cart-summary {
    border-top: 1px solid var(--border);
    padding-top: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .cart-total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
  }

  .cart-total-label {
    color: var(--text-muted);
    font-size: 1rem;
    font-weight: 500;
  }

  .cart-total-value {
    color: var(--accent);
    font-size: 1.8rem;
    font-weight: 800;
  }

  /* =========================================
     FORMULARIO DE PEDIDO
     ========================================= */
  .cart-form {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .form-group label {
    font-size: 0.85rem;
    color: var(--text-muted);
    font-weight: 500;
  }

  .cart-form input {
    padding: 1rem 1.2rem;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-light);
    background: var(--secondary);
    color: var(--text-main);
    font-size: 0.95rem;
    transition: var(--transition);
    outline: none;
  }

  .cart-form input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  /* =========================================
     BOTÓN WHATSAPP PREMIUM
     ========================================= */
  .btn-whatsapp {
    background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
    color: white;
    border: none;
    padding: 1.2rem 1.5rem;
    border-radius: var(--radius-md);
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    transition: var(--transition);
    font-size: 1rem;
    letter-spacing: 0.5px;
    box-shadow: 0 6px 20px rgba(37, 211, 102, 0.25);
  }

  .btn-whatsapp:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(37, 211, 102, 0.4);
  }

  /* =========================================
     NOTIFICACIONES (TOASTS) MEJORADAS
     ========================================= */
  #toast-root {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    z-index: 3000;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    max-width: 350px;
  }

  .toast {
    background: var(--secondary);
    color: var(--text-main);
    padding: 1rem 1.5rem;
    border-radius: var(--radius-md);
    font-weight: 600;
    box-shadow: var(--shadow-lg);
    border-left: 4px solid var(--accent);
    display: flex;
    align-items: center;
    gap: 10px;
    animation: slideInRight 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
  }

  .toast-error {
    position: fixed;
    top: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--error);
    color: white;
    padding: 1.2rem 2rem;
    border-radius: var(--radius-md);
    font-weight: 700;
    z-index: 5000;
    box-shadow: 0 15px 35px rgba(255, 82, 82, 0.3);
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideInDown 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    border: none;
  }

  @keyframes slideInRight {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  @keyframes slideInDown {
    from { transform: translate(-50%, -150%); opacity: 0; }
    to { transform: translate(-50%, 0); opacity: 1; }
  }

  /* =========================================
     ESTADO VACÍO DEL CARRITO
     ========================================= */
  .empty-cart {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1rem;
    text-align: center;
    color: var(--text-muted);
  }

  .empty-cart i {
    margin-bottom: 1rem;
    opacity: 0.5;
  }

  /* =========================================
     EFECTOS DE FOCO Y ACCESIBILIDAD
     ========================================= */
  button:focus-visible,
  input:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* =========================================
     RESPONSIVE ADICIONAL
     ========================================= */
  @media (max-width: 768px) {
    .container {
      padding: 1.5rem 1rem;
    }
    
    header {
      padding: 1rem 1.2rem;
    }
    
    .logo-premium {
      font-size: 3rem;
    }
    
    .drawer {
      max-width: 100%;
      padding: 1.5rem;
    }
    
    #toast-root {
      bottom: 1rem;
      right: 1rem;
      left: 1rem;
      max-width: 100%;
    }
    
    .toast {
      width: 100%;
    }
  }

  @media (max-width: 480px) {
    .grid {
      grid-template-columns: 1fr;
    }
    
    .logo-premium {
      font-size: 2.5rem;
    }
    
    .brand {
      font-size: 1.2rem;
    }
  }
</style>
</head>
<body>

  <!-- Pantalla de Carga -->
  <div id="splash-screen">
    <div class="logo-premium">Cuban Store</div>
    <div class="splash-subtitle">"Todo lo que usted busca"</div>
    <div class="loader-container"><div class="loader-bar"></div></div>
  </div>

  <header>
    <div class="brand">
      <i data-lucide="shield-check"></i>
      <span>CUBAN STORE</span>
    </div>
    <button class="cart-trigger" onclick="toggleCart(true)">
      <i data-lucide="shopping-cart"></i>
      <div class="cart-count" id="cart-count">0</div>
    </button>
  </header>

  <main class="container">
    <section id="categories-view">
      <div class="section-header">
        <i data-lucide="layout-grid" style="color: var(--accent)"></i>
        <h2>Categorías</h2>
      </div>
      <div class="grid" id="categories-grid"></div>
    </section>

    <section id="products-view" style="display: none;">
      <button onclick="showCategories()" style="background:none; border:none; color:var(--accent); cursor:pointer; display:flex; align-items:center; gap:5px; margin-bottom:20px; font-weight:600;">
        <i data-lucide="chevron-left"></i> Volver
      </button>
      <div class="section-header">
        <i data-lucide="package" style="color: var(--accent)"></i>
        <h2 id="current-cat-name">Productos</h2>
      </div>
      <div class="grid" id="products-grid"></div>
    </section>
  </main>

  <!-- Carrito -->
  <div class="drawer-overlay" id="cart-overlay" onclick="toggleCart(false)">
    <div class="drawer" onclick="event.stopPropagation()">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h3 style="margin:0; letter-spacing:1px;">Mi Pedido</h3>
        <button onclick="toggleCart(false)" style="background:none; border:none; color:white; cursor:pointer"><i data-lucide="x"></i></button>
      </div>
      
      <div id="cart-list" style="flex:1; overflow-y:auto;"></div>

      <div style="border-top: 1px solid var(--border); padding-top:20px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
          <span style="color:var(--text-muted)">TOTAL</span>
          <span id="cart-total" style="color:var(--accent); font-size:1.5rem; font-weight:800;">$0</span>
        </div>

        <div class="cart-form">
          <input type="text" id="order-name" placeholder="Nombre completo">
          <input type="text" id="order-address" placeholder="Dirección exacta">
          <input type="text" id="order-ref" placeholder="Punto de referencia (ej: frente al parque)">
          <input type="tel" id="order-phone" placeholder="Teléfono">
        </div>

        <button class="btn-whatsapp" onclick="sendOrder()">
          <i data-lucide="send"></i> ENVIAR PEDIDO POR WHATSAPP
        </button>
      </div>
    </div>
  </div>

  <div id="toast-root"></div>

  <script type="module">
    import { getCategories, getAllProducts } from './api.js';

    let DB = { categories: [], products: [] };
    let cart = [];
    let currentCategoryId = null; 
    let currentCategoryName = "";

    async function init() {
      await updateDataFromServer();
      renderCategories();
      
      setTimeout(() => {
        document.getElementById('splash-screen').style.opacity = '0';
        setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 800);
      }, 2000);

      setInterval(async () => {
        await updateDataFromServer();
        refreshCurrentView(); 
      }, 30000); 
    }

    async function updateDataFromServer() {
      try {
        const [cats, prods] = await Promise.all([getCategories(), getAllProducts()]);
        DB.categories = cats;
        DB.products = prods;
      } catch (err) {
        console.error("Error actualizando datos:", err);
      }
    }

    function refreshCurrentView() {
      const isProductView = document.getElementById('products-view').style.display === 'block';
      if (isProductView && currentCategoryId) {
        renderProducts(currentCategoryId, currentCategoryName);
      } else {
        renderCategories();
      }
    }

    function renderCategories() {
      const grid = document.getElementById('categories-grid');
      grid.innerHTML = DB.categories.map(cat => `
        <div class="card" onclick="showProducts('${cat.id}', '${cat.name}')">
          <div class="card-media"><img src="${cat.image_url || 'https://via.placeholder.com/300'}" alt="${cat.name}"></div>
          <div class="card-body" style="text-align:center;">
            <div class="card-title">${cat.name}</div>
          </div>
        </div>
      `).join('');
      lucide.createIcons();
    }

    function renderProducts(catId, catName) {
      const filtered = DB.products.filter(p => String(p.category_id) === String(catId));
      const grid = document.getElementById('products-grid');
      
      grid.innerHTML = filtered.map(p => `
        <div class="card">
          <div class="card-media"><img src="${p.image_url || 'https://via.placeholder.com/300'}" loading="lazy"></div>
          <div class="card-body">
            <div class="card-title">${p.name}</div>
            <div class="card-price">$${Number(p.price).toLocaleString()}</div>
            <button class="btn-action" onclick="addToCart('${p.id}')">
              <i data-lucide="shopping-cart" style="width:16px"></i> AGREGAR
            </button>
          </div>
        </div>
      `).join('');
      lucide.createIcons();
    }

    window.showProducts = (catId, catName) => {
      currentCategoryId = catId;
      currentCategoryName = catName;
      document.getElementById('categories-view').style.display = 'none';
      document.getElementById('products-view').style.display = 'block';
      document.getElementById('current-cat-name').innerText = catName;
      renderProducts(catId, catName);
      window.scrollTo(0,0);
    };

    window.showCategories = () => {
      currentCategoryId = null;
      document.getElementById('products-view').style.display = 'none';
      document.getElementById('categories-view').style.display = 'block';
      renderCategories();
    };

    window.toggleCart = (open) => {
      document.getElementById('cart-overlay').classList.toggle('active', open);
    };

    window.addToCart = (id) => {
      const product = DB.products.find(p => String(p.id) === String(id));
      if(product) {
        cart.push({...product});
        updateCartUI();
        showToast("Producto añadido");
      }
    };

    window.removeFromCart = (index) => {
      cart.splice(index, 1);
      updateCartUI();
    };

    function updateCartUI() {
      const list = document.getElementById('cart-list');
      const totalEl = document.getElementById('cart-total');
      const countEl = document.getElementById('cart-count');
      countEl.innerText = cart.length;
      let total = 0;

      list.innerHTML = cart.map((item, i) => {
        total += Number(item.price);
        return `
          <div class="cart-item">
            <img src="${item.image_url}" style="width:50px; height:50px; border-radius:6px; object-fit:cover">
            <div class="cart-item-info" style="flex:1">
              <h4>${item.name}</h4>
              <span>$${Number(item.price).toLocaleString()}</span>
            </div>
            <button onclick="removeFromCart(${i})" style="border:none; color:#EF4444; background:none; cursor:pointer"><i data-lucide="trash-2" style="width:18px"></i></button>
          </div>
        `;
      }).join('');
      totalEl.innerText = `$${total.toLocaleString()}`;
      lucide.createIcons();
    }

    // --- FUNCIÓN DE ERROR PERSONALIZADA (SUPERIOR) ---
    function showTopError(msg) {
      const root = document.getElementById('toast-root');
      const toast = document.createElement('div');
      toast.className = 'toast-error';
      toast.innerHTML = `<i data-lucide="alert-circle"></i> <span>${msg}</span>`;
      root.appendChild(toast);
      lucide.createIcons();

      setTimeout(() => {
        toast.style.transition = "opacity 0.5s ease";
        toast.style.opacity = "0";
        setTimeout(() => toast.remove(), 500);
      }, 3000);
    }

    window.sendOrder = () => {
      const name = document.getElementById('order-name').value;
      const addr = document.getElementById('order-address').value;
      const ref = document.getElementById('order-ref').value;
      const phone = document.getElementById('order-phone').value;

      // VALIDACIONES SIN ALERT()
      if(cart.length === 0) {
        showTopError("El carrito está vacío");
        return;
      }
      if(!name || !addr || !phone) {
        showTopError("Faltan datos obligatorios");
        return;
      }

      let total = 0;
      const itemsList = cart.map(item => {
        total += Number(item.price);
        return `• *${item.name}* ($${Number(item.price).toLocaleString()})`;
      }).join('\n');

      const text = encodeURIComponent(
        `👑 *NUEVO PEDIDO | CUBAN STORE*\n\n` +
        `👤 *Cliente:* ${name}\n` +
        `📍 *Dirección:* ${addr}\n` +
        `🚩 *Punto Ref:* ${ref || 'No especificado'}\n` +
        `📞 *Teléfono:* ${phone}\n\n` +
        `🛍️ *PRODUCTOS:*\n${itemsList}\n\n` +
        `💰 *TOTAL:* $${total.toLocaleString()}\n\n` +
        `✅ _*Gracias por Preferirnos*_`
      );

      window.open(`https://wa.me/56947641?text=${text}`, '_blank');
    };

    function showToast(msg) {
      const root = document.getElementById('toast-root');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = msg;
      root.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    init();
</script>
</body>

</html>
