<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cuban-Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* =========================================
       VARIABLES PREMIUM DARK & GOLD
       ========================================= */
    :root {
      --primary: #09090B;      /* Negro Zinc profundo */
      --secondary: #18181B;    /* Gris oscuro para tarjetas */
      --accent: #D4AF37;       /* Dorado Metálico */
      --accent-hover: #F1C40F; /* Dorado brillante */
      --bg-site: #020617;      /* Fondo ultra oscuro */
      --text-main: #FAFAFA;
      --text-muted: #A1A1AA;
      --border: #27272A;
      --radius: 12px;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      --transition: all 0.3s ease;
    }

    * { box-sizing: border-box; }
    body { 
      font-family: 'Inter', -apple-system, sans-serif; 
      margin: 0; background-color: var(--bg-site); color: var(--text-main);
      -webkit-tap-highlight-color: transparent;
    }

    /* =========================================
       PANTALLA DE CARGA (SPLASH)
       ========================================= */
    #splash-screen {
      position: fixed; inset: 0; background: var(--primary);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.8s ease;
    }

    .logo-premium {
      font-family: sans-serif;
      font-size: 3rem; font-weight: 800; color: var(--accent);
      text-transform: uppercase; letter-spacing: 4px;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
    }
    
    .splash-subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    .loader-container { width: 180px; height: 2px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
    .loader-bar { width: 40%; height: 100%; background: var(--accent); animation: loading 1.5s infinite ease-in-out; }
    @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(300%); } }

    /* =========================================
       HEADER
       ========================================= */
    header {
      background: rgba(9, 9, 11, 0.95); padding: 1rem 1.5rem;
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 1000; 
      border-bottom: 1px solid var(--border); backdrop-filter: blur(10px);
    }

    .brand {
      display: flex; align-items: center; gap: 10px;
      font-size: 1.3rem; font-weight: 700; color: var(--accent);
      letter-spacing: 1px;
    }

    .cart-trigger {
      background: transparent; color: var(--text-main); border: 1px solid var(--border);
      width: 45px; height: 45px; border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      position: relative; transition: var(--transition);
    }
    .cart-trigger:hover { border-color: var(--accent); color: var(--accent); }
    
    /* Contador a un costado */
    .cart-count {
      position: absolute; top: -5px; right: -8px;
      background: var(--accent); color: var(--primary);
      font-size: 10px; font-weight: 900; min-width: 18px; height: 18px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--primary);
    }

    /* =========================================
       GRIDS Y TARJETAS
       ========================================= */
    .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 40px; }

    @media (min-width: 768px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 24px; }
    }

    .card {
      background: var(--secondary); border-radius: var(--radius);
      overflow: hidden; border: 1px solid var(--border);
      transition: var(--transition);
    }
    .card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: var(--shadow); }

    .card-media {
      width: 100%; aspect-ratio: 1/1; overflow: hidden; background: #111;
      display: flex; align-items: center; justify-content: center;
    }
    .card-media img { width: 100%; height: 100%; object-fit: cover; }

    .card-body { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
    .card-title { font-weight: 600; font-size: 0.9rem; color: var(--text-main); height: 2.5em; overflow: hidden; }
    .card-price { font-size: 1.2rem; font-weight: 800; color: var(--accent); }
    
    .btn-action {
      background: var(--accent); color: var(--primary); border: none; padding: 10px;
      border-radius: 8px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: var(--transition);
    }
    .btn-action:hover { background: var(--accent-hover); transform: scale(1.02); }

    /* =========================================
       CARRITO (DRAWER)
       ========================================= */
    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      z-index: 2000; opacity: 0; visibility: hidden; transition: 0.3s;
      backdrop-filter: blur(8px);
    }
    .drawer-overlay.active { opacity: 1; visibility: visible; }

    .drawer {
      position: absolute; right: -100%; top: 0; width: 100%; max-width: 420px;
      height: 100%; background: var(--primary); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; flex-direction: column; padding: 30px; border-left: 1px solid var(--border);
    }
    .drawer-overlay.active .drawer { right: 0; }

    .cart-item {
      display: flex; align-items: center; gap: 15px; padding: 15px 0;
      border-bottom: 1px solid var(--border);
    }
    .cart-item-info h4 { margin: 0; font-size: 0.9rem; color: var(--text-main); }
    .cart-item-info span { color: var(--accent); font-weight: 700; }

    /* FORMULARIO */
    .cart-form { margin-top: 20px; display: flex; flex-direction: column; gap: 12px; }
    .cart-form input {
      padding: 14px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--secondary); color: white; font-size: 0.9rem;
      transition: 0.2s; outline: none;
    }
    .cart-form input:focus { border-color: var(--accent); }

    .btn-whatsapp {
      background: #25D366; color: white; border: none; padding: 16px;
      border-radius: 10px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-top: 20px;
    }

    /* MISC */
    .section-header { display: flex; align-items: center; gap: 12px; margin: 30px 0; }
    .section-header h2 { font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; margin: 0; }
    
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: var(--primary); padding: 12px 24px;
      border-radius: 8px; font-weight: 700; z-index: 3000; box-shadow: var(--shadow);
    }
  </style>
</head>
<body>

  <!-- Pantalla de Carga -->
  <div id="splash-screen">
    <div class="logo-premium">Cuban Store</div>
    <div class="splash-subtitle">"Todo lo que usted busca"</div>
    <div class="loader-container"><div class="loader-bar"></div></div>
  </div>

  <header>
    <div class="brand">
      <i data-lucide="shield-check"></i>
      <span>CUBAN STORE</span>
    </div>
    <button class="cart-trigger" onclick="toggleCart(true)">
      <i data-lucide="shopping-cart"></i>
      <div class="cart-count" id="cart-count">0</div>
    </button>
  </header>

  <main class="container">
    <section id="categories-view">
      <div class="section-header">
        <i data-lucide="layout-grid" style="color: var(--accent)"></i>
        <h2>Categorías</h2>
      </div>
      <div class="grid" id="categories-grid"></div>
    </section>

    <section id="products-view" style="display: none;">
      <button onclick="showCategories()" style="background:none; border:none; color:var(--accent); cursor:pointer; display:flex; align-items:center; gap:5px; margin-bottom:20px; font-weight:600;">
        <i data-lucide="chevron-left"></i> Volver
      </button>
      <div class="section-header">
        <i data-lucide="package" style="color: var(--accent)"></i>
        <h2 id="current-cat-name">Productos</h2>
      </div>
      <div class="grid" id="products-grid"></div>
    </section>
  </main>

  <!-- Carrito -->
  <div class="drawer-overlay" id="cart-overlay" onclick="toggleCart(false)">
    <div class="drawer" onclick="event.stopPropagation()">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h3 style="margin:0; letter-spacing:1px;">Mi Pedido</h3>
        <button onclick="toggleCart(false)" style="background:none; border:none; color:white; cursor:pointer"><i data-lucide="x"></i></button>
      </div>
      
      <div id="cart-list" style="flex:1; overflow-y:auto;"></div>

      <div style="border-top: 1px solid var(--border); padding-top:20px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
          <span style="color:var(--text-muted)">TOTAL</span>
          <span id="cart-total" style="color:var(--accent); font-size:1.5rem; font-weight:800;">$0</span>
        </div>

        <div class="cart-form">
          <input type="text" id="order-name" placeholder="Nombre completo">
          <input type="text" id="order-address" placeholder="Dirección exacta">
          <input type="text" id="order-ref" placeholder="Punto de referencia (ej: frente al parque)">
          <input type="tel" id="order-phone" placeholder="Teléfono">
        </div>

        <button class="btn-whatsapp" onclick="sendOrder()">
          <i data-lucide="send"></i> ENVIAR PEDIDO POR WHATSAPP
        </button>
      </div>
    </div>
  </div>

  <div id="toast-root"></div>

  <script type="module">
    import { getCategories, getAllProducts } from './api.js';

    let DB = { categories: [], products: [] };
    let cart = [];
    let currentCategoryId = null; // Guardamos el ID actual para refrescos automáticos
    let currentCategoryName = "";

    async function init() {
      // Primera carga
      await updateDataFromServer();
      renderCategories();
      
      // Ocultar splash
      setTimeout(() => {
        document.getElementById('splash-screen').style.opacity = '0';
        setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 800);
      }, 2000);

      // --- RECARGA EN SEGUNDO PLANO ---
      // Se ejecuta cada 30 segundos (30000ms)
      setInterval(async () => {
        console.log("Actualizando datos en segundo plano...");
        await updateDataFromServer();
        refreshCurrentView(); // Refresca lo que el usuario esté viendo
      }, 30000); 
    }

    // Función pura para traer datos del API
    async function updateDataFromServer() {
      try {
        const [cats, prods] = await Promise.all([getCategories(), getAllProducts()]);
        DB.categories = cats;
        DB.products = prods;
      } catch (err) {
        console.error("Error actualizando datos:", err);
      }
    }

    // Decide qué renderizar dependiendo de dónde esté el usuario
    function refreshCurrentView() {
      const isProductView = document.getElementById('products-view').style.display === 'block';
      
      if (isProductView && currentCategoryId) {
        renderProducts(currentCategoryId, currentCategoryName);
      } else {
        renderCategories();
      }
    }

    function renderCategories() {
      const grid = document.getElementById('categories-grid');
      // Usamos innerHTML solo si hay cambios o para inicializar
      grid.innerHTML = DB.categories.map(cat => `
        <div class="card" onclick="showProducts('${cat.id}', '${cat.name}')">
          <div class="card-media"><img src="${cat.image_url || 'https://via.placeholder.com/300'}" alt="${cat.name}"></div>
          <div class="card-body" style="text-align:center;">
            <div class="card-title">${cat.name}</div>
          </div>
        </div>
      `).join('');
      lucide.createIcons();
    }

    // Función para renderizar productos (separada de la lógica de navegación)
    function renderProducts(catId, catName) {
      const filtered = DB.products.filter(p => String(p.category_id) === String(catId));
      const grid = document.getElementById('products-grid');
      
      grid.innerHTML = filtered.map(p => `
        <div class="card">
          <div class="card-media"><img src="${p.image_url || 'https://via.placeholder.com/300'}" loading="lazy"></div>
          <div class="card-body">
            <div class="card-title">${p.name}</div>
            <div class="card-price">$${Number(p.price).toLocaleString()}</div>
            <button class="btn-action" onclick="addToCart('${p.id}')">
              <i data-lucide="shopping-cart" style="width:16px"></i> AGREGAR
            </button>
          </div>
        </div>
      `).join('');
      lucide.createIcons();
    }

    // Cambiar de vista a productos
    window.showProducts = (catId, catName) => {
      currentCategoryId = catId;
      currentCategoryName = catName;
      
      document.getElementById('categories-view').style.display = 'none';
      document.getElementById('products-view').style.display = 'block';
      document.getElementById('current-cat-name').innerText = catName;
      
      renderProducts(catId, catName);
      window.scrollTo(0,0);
    };

    // Volver a categorías
    window.showCategories = () => {
      currentCategoryId = null; // Limpiamos el estado
      document.getElementById('products-view').style.display = 'none';
      document.getElementById('categories-view').style.display = 'block';
      renderCategories();
    };

    // --- EL RESTO DE TUS FUNCIONES (Cart, Toast, etc.) SE MANTIENEN IGUAL ---
    
    window.toggleCart = (open) => {
      document.getElementById('cart-overlay').classList.toggle('active', open);
    };

    window.addToCart = (id) => {
      const product = DB.products.find(p => String(p.id) === String(id));
      if(product) {
        cart.push({...product});
        updateCartUI();
        showToast("Producto añadido");
      }
    };

    window.removeFromCart = (index) => {
      cart.splice(index, 1);
      updateCartUI();
    };

    function updateCartUI() {
      const list = document.getElementById('cart-list');
      const totalEl = document.getElementById('cart-total');
      const countEl = document.getElementById('cart-count');
      countEl.innerText = cart.length;
      let total = 0;

      list.innerHTML = cart.map((item, i) => {
        total += Number(item.price);
        return `
          <div class="cart-item">
            <img src="${item.image_url}" style="width:50px; height:50px; border-radius:6px; object-fit:cover">
            <div class="cart-item-info" style="flex:1">
              <h4>${item.name}</h4>
              <span>$${Number(item.price).toLocaleString()}</span>
            </div>
            <button onclick="removeFromCart(${i})" style="border:none; color:#EF4444; background:none; cursor:pointer"><i data-lucide="trash-2" style="width:18px"></i></button>
          </div>
        `;
      }).join('');
      totalEl.innerText = `$${total.toLocaleString()}`;
      lucide.createIcons();
    }

    window.sendOrder = () => {
      const name = document.getElementById('order-name').value;
      const addr = document.getElementById('order-address').value;
      const ref = document.getElementById('order-ref').value;
      const phone = document.getElementById('order-phone').value;

      if(!name || !addr || cart.length === 0) {
        alert("Por favor completa los campos principales.");
        return;
      }

      let total = 0;
      const itemsList = cart.map(item => {
        total += Number(item.price);
        return `• *${item.name}* ($${Number(item.price).toLocaleString()})`;
      }).join('\n');

      const text = encodeURIComponent(
        `👑 *NUEVO PEDIDO | CUBAN STORE*\n\n` +
        `👤 *Cliente:* ${name}\n` +
        `📍 *Dirección:* ${addr}\n` +
        `🚩 *Punto Ref:* ${ref || 'No especificado'}\n` +
        `📞 *Teléfono:* ${phone}\n\n` +
        `🛍️ *PRODUCTOS:*\n${itemsList}\n\n` +
        `💰 *TOTAL:* $${total.toLocaleString()}\n\n` +
        `✅ _*Gracias por Preferirnos*_`
      );

      // Cambia este número por el tuyo real
      window.open(`https://wa.me/53910527?text=${text}`, '_blank');
    };

    function showToast(msg) {
      const root = document.getElementById('toast-root');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = msg;
      root.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    init();
</script>
</body>

</html>
